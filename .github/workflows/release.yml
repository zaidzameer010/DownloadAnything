name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for release (e.g., v1.0.0)'
        required: true

jobs:
  release:
    permissions:
      contents: write
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Forces the workflow to fetch the absolute latest commit that triggered the run
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-all-crates: true

      - name: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PUBKEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        with:
          # Uses the manual input if dispatched manually; falls back to the git tag on push
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'DownloadAnything ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: 'DownloadAnything Release'
          releaseDraft: true
          prerelease: false
          # Dynamically overrides the plugins object at build-time
          args: --config '{"plugins":{"updater":{"pubkey":"${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}"}}}'

      - name: Cleanup old caches
        shell: bash # Forces Bash on Windows so '|| true' doesn't cause a syntax error
        run: |
          gh cache delete --all --ref "${{ github.ref }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}