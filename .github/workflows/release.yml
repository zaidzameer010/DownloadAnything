name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for release (e.g., v1.0.0)'
        required: true

jobs:
  release:
    permissions:
      contents: write
      actions: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Forces the workflow to fetch the absolute latest commit that triggered the run
          ref: ${{ github.sha }}

      - name: Download aria2-next binary (macOS)
        if: matrix.platform == 'macos-latest'
        run: gh release download -R AnInsomniacy/aria2-next --pattern "aria2-next-*-macos-arm64" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download aria2-next binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          gh release download -R AnInsomniacy/aria2-next --pattern "aria2-next-*-windows-x86_64.exe" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv pip install --system -r requirements.txt

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-all-crates: true

      - name: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PUBKEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        with:
          # Uses the manual input if dispatched manually; falls back to the git tag on push
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'DownloadAnything ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: 'DownloadAnything Release'
          releaseDraft: true
          prerelease: false
          # Dynamically overrides the plugins object at build-time
          args: --config '{"plugins":{"updater":{"pubkey":"${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}"}}}'

      - name: Cleanup old caches
        shell: bash # Forces Bash on Windows so '|| true' doesn't cause a syntax error
        run: |
          gh cache delete --all --ref "${{ github.ref }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  updater-json:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all release assets
        run: |
          TAG=${{ github.event.inputs.version || github.ref_name }}
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          gh release download "$TAG" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate combined latest.json
        run: |
          python3 -c '
          import os, json, glob, datetime
          tag = os.getenv("RELEASE_TAG")
          owner_repo = os.getenv("GITHUB_REPOSITORY")
          latest = {
              "version": tag.lstrip("v"),
              "notes": f"Release {tag}",
              "pub_date": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "platforms": {}
          }
          sig_files = glob.glob("*.sig")
          for sig_file in sig_files:
              archive_file = sig_file[:-4]
              if os.path.exists(archive_file):
                  with open(sig_file, "r") as f:
                      sig = f.read().strip()
                  archive_lower = archive_file.lower()
                  platform_key = None
                  if "aarch64" in archive_lower or "arm64" in archive_lower:
                      platform_key = "darwin-aarch64"
                  elif "x64" in archive_lower or "x86_64" in archive_lower:
                      if "setup" in archive_lower or "nsis" in archive_lower or "msi" in archive_lower:
                          platform_key = "windows-x86_64"
                  if platform_key:
                      latest["platforms"][platform_key] = {
                          "signature": sig,
                          "url": f"https://github.com/{owner_repo}/releases/download/{tag}/{archive_file}"
                      }
          with open("latest.json", "w") as f:
              json.dump(latest, f, indent=2)
          print("Generated latest.json:")
          print(json.dumps(latest, indent=2))
          '
        env:
          RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}

      - name: Upload latest.json back to release
        run: |
          TAG=${{ github.event.inputs.version || github.ref_name }}
          gh release upload "$TAG" latest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}